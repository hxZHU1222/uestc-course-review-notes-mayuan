name: Build and Release Apps

on:
  push:
    branches:
      - release
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Prepare web files
        run: npm run build:web

      - name: Prepare Capacitor Android project
        run: |
          npx cap add android
          npx cap sync android

      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore release.keystore -alias my-key-alias -keyalg RSA -keysize 2048 -validity 10000 -storepass password -keypass password -dname "CN=Unknown, OU=Unknown, O=Unknown, L=Unknown, ST=Unknown, C=Unknown"

      - name: Build and Sign APK
        run: |
          cd android
          ./gradlew assembleRelease -Pandroid.injected.signing.store.file=$(pwd)/../release.keystore -Pandroid.injected.signing.store.password=password -Pandroid.injected.signing.key.alias=my-key-alias -Pandroid.injected.signing.key.password=password

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: android/app/build/outputs/apk/release/app-release.apk

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare Electron Files
        run: |
          npm install
          npm install electron electron-builder --save-dev

      - name: Create Electron Main
        shell: bash
        run: |
          mkdir electron
          cat << 'EOF' > electron/main.js
          const { app, BrowserWindow } = require('electron');
          const path = require('path');
          function createWindow () {
            const win = new BrowserWindow({
              width: 1280,
              height: 800,
              autoHideMenuBar: true,
              webPreferences: { nodeIntegration: false }
            });
            win.loadFile('index.html');
          }
          app.whenReady().then(createWindow);
          app.on('window-all-closed', () => {
            if (process.platform !== 'darwin') app.quit();
          });
          EOF

      - name: Update Package.json for Electron Builder
        shell: bash
        run: |
          node -e "const fs = require('fs'); let p = JSON.parse(fs.readFileSync('package.json')); p.main = 'electron/main.js'; p.build = { appId: 'com.hxzhu1222.mayuan', productName: '马原复习系统', directories: { output: 'build-out' }, win: { target: 'nsis' } }; fs.writeFileSync('package.json', JSON.stringify(p, null, 2));"

      - name: Build EXE
        run: npx electron-builder --win

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: build-out/*.exe

  release:
    needs: [build-android, build-windows]
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download APK Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release.apk
          path: release-artifacts

      - name: Download EXE Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: release-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/*.apk
            release-artifacts/*.exe
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: Release ${{ github.event.inputs.version || github.ref_name }}
          generate_release_notes: true
