<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>马原复习系统</title>
    <link rel="stylesheet" href="css/style.css?v=3" />
  </head>
  <body>
    <div id="lock" class="lock-screen">
      <form id="loginForm" class="login-panel">
        <h1>马原复习系统</h1>
        <p>输入本地访问密码</p>
        <div class="login-row">
          <input id="passwordInput" type="password" autocomplete="current-password" placeholder="默认密码 mayuan" />
          <button type="submit">进入</button>
        </div>
        <div id="loginError" class="form-error"></div>
      </form>
    </div>

    <div id="app" class="app hidden">
      <header class="topbar app-chrome">
        <div class="brand-lockup">
          <span class="brand-mark" aria-hidden="true">M</span>
          <div>
            <div class="eyebrow">马克思主义基本原理</div>
            <h1>马原复习</h1>
          </div>
        </div>
        <nav class="nav-tabs liquid-nav" aria-label="主导航">
          <button data-page="home" class="active">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 2v4M16 2v4M4 9h16M6 4h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z" /></svg>
            <span>今日</span>
          </button>
          <button data-page="recite">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" /><path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15Z" /></svg>
            <span>背诵</span>
          </button>
          <button data-page="cards">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16M4 12h16M4 17h10" /><path d="M3 5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5Z" /></svg>
            <span>卡片</span>
          </button>
          <button data-page="short">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 6h12M8 12h12M8 18h8" /><path d="M4 6h.01M4 12h.01M4 18h.01" /></svg>
            <span>简答</span>
          </button>
          <button data-page="choice">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 11 3 3L22 4" /><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" /></svg>
            <span>选择</span>
          </button>
          <button data-page="mindmap">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 8h4a3 3 0 0 1 3 3M19 8h-4a3 3 0 0 0-3 3M5 16h4a3 3 0 0 0 3-3M19 16h-4a3 3 0 0 1-3-3" /><circle cx="5" cy="8" r="2" /><circle cx="19" cy="8" r="2" /><circle cx="5" cy="16" r="2" /><circle cx="19" cy="16" r="2" /></svg>
            <span>导图</span>
          </button>
        </nav>
        <div class="chrome-meta" aria-label="界面风格">Light</div>
      </header>

      <main id="mainContent">
        <section id="page-home" class="page active"></section>
        <section id="page-recite" class="page"></section>
        <section id="page-cards" class="page"></section>
        <section id="page-short" class="page"></section>
        <section id="page-choice" class="page"></section>
        <section id="page-mindmap" class="page"></section>
        <section id="page-check" class="page"></section>
      </main>
    </div>

    <script src="js/app.js?v=4"></script>
  </body>
</html>
