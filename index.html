<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>马原复习系统</title>
    <link rel="stylesheet" href="css/style.css?v=3" />
  </head>
  <body>
    <div id="lock" class="lock-screen">
      <form id="loginForm" class="login-panel">
        <h1>马原复习系统</h1>
        <p>输入本地访问密码</p>
        <div class="login-row">
          <input id="passwordInput" type="password" autocomplete="current-password" placeholder="默认密码 mayuan" />
          <button type="submit">进入</button>
        </div>
        <div id="loginError" class="form-error"></div>
      </form>
    </div>

    <div id="app" class="app hidden">
      <header class="topbar">
        <div>
          <div class="eyebrow">马克思主义基本原理</div>
          <h1>讲义背诵 · 简答题 · 选择题 · 思维导图</h1>
        </div>
        <nav class="nav-tabs" aria-label="主导航">
          <button data-page="home" class="active">首页</button>
          <button data-page="recite">背诵</button>
          <button data-page="cards">卡片列表</button>
          <button data-page="short">简答题</button>
          <button data-page="choice">选择题</button>
          <button data-page="mindmap">思维导图</button>
          <button data-page="check">资料/检查</button>
        </nav>
      </header>

      <main>
        <section id="page-home" class="page active"></section>
        <section id="page-recite" class="page"></section>
        <section id="page-cards" class="page"></section>
        <section id="page-short" class="page"></section>
        <section id="page-choice" class="page"></section>
        <section id="page-mindmap" class="page"></section>
        <section id="page-check" class="page"></section>
      </main>
    </div>

    <script src="js/app.js?v=4"></script>
  </body>
</html>
